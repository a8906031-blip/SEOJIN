<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEOJIN PLATECH — 신규개발 일지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #d0d7de;
    --text: #1a1f2e;
    --text2: #57606a;
    --text3: #a0aab4;
    --blue: #1a6fd4;
    --blue-dim: #1a6fd415;
    --purple: #7c50d6;
    --purple-dim: #7c50d615;
    --green: #1a8c3a;
    --green-dim: #1a8c3a15;
    --yellow: #a8720a;
    --yellow-dim: #a8720a15;
    --red: #d93025;
    --red-dim: #d9302515;
    --gray: #8c959f;
    --gray-dim: #e8eaed;
    --accent: #1a6fd4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px 0;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    margin-bottom: 16px;
  }
  .logo-area { display: flex; align-items: center; gap: 16px; }
  .logo-area img { height: 40px; width: auto; filter: brightness(0) saturate(100%) invert(40%) sepia(90%) saturate(500%) hue-rotate(190deg) brightness(110%); }
  .logo-area h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: #ffffff; }
  .logo-area h1 span { color: #ffffff; }
  .logo-divider {
    width: 1px; height: 36px; background: var(--border);
  }
  .header-actions { display: flex; gap: 8px; }
  .btn {
    padding: 7px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--blue); color: var(--blue); }
  .btn-primary {
    background: var(--blue); border-color: var(--blue); color: #fff;
  }
  .btn-primary:hover { background: #388bfd; color: #fff; border-color: #388bfd; }


  /* LOADING OVERLAY */
  #loadingOverlay {
    position: fixed; inset: 0; background: #f5f7fa;
    z-index: 9999; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    transition: opacity 0.4s ease;
  }
  #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
  .loading-logo {
    font-size: 20px; font-weight: 900; letter-spacing: 1.5px;
    color: #1a6fd4; font-family: 'Noto Sans KR', sans-serif;
  }
  .loading-msg {
    font-size: 13px; color: #57606a; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .loading-bar-wrap {
    width: 180px; height: 3px; background: #e0e4ea;
    border-radius: 99px; overflow: hidden;
  }
  .loading-bar {
    height: 100%; width: 30%; background: #1a6fd4;
    border-radius: 99px;
    animation: loadingSlide 1.2s ease-in-out infinite;
  }
  @keyframes loadingSlide {
    0%   { transform: translateX(-100%); }
    50%  { transform: translateX(200%); }
    100% { transform: translateX(500%); }
  }

  /* TABS */
  .tabs { display: flex; gap: 0; }
  .tab {
    padding: 9px 20px; border: none; background: none; color: var(--text2);
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
    font-weight: 700; border-bottom: 2px solid transparent;
    transition: all 0.15s; border-radius: 4px 4px 0 0;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--blue); }
  .tab:hover:not(.active) { color: var(--text); }

  /* MAIN */
  .main { padding: 24px 28px; max-width: 1500px; margin: 0 auto; }

  /* STAT CARDS */
  .stats-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--blue); }
  .stat-label { font-size: 11px; color: var(--text2); font-weight: 600; margin-bottom: 6px; letter-spacing: 0.5px; }
  .stat-value { font-size: 30px; font-weight: 900; font-family: 'DM Mono', monospace; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* FILTERS */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
  }
  .filter-bar input, .filter-bar select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 6px; font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px; outline: none; transition: border-color 0.15s;
  }
  .filter-bar input { flex: 1; min-width: 200px; }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--blue); }
  .filter-bar select option { background: var(--surface2); }
  .filter-count {
    font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 6px; white-space: nowrap;
  }

  /* VIEW TOGGLE */
  .view-toggle {
    display: flex; gap: 4px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 3px;
  }
  .view-btn {
    padding: 5px 12px; border-radius: 5px; border: none; background: none;
    color: var(--text2); cursor: pointer; font-size: 12px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  }
  .view-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px #0004; }

  /* PROCESS LEGEND */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; font-size: 11px;
  }
  .legend-title { color: var(--text2); font-weight: 700; }
  .legend-item { display: flex; align-items: center; gap: 5px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend-bar { width: 14px; height: 5px; border-radius: 3px; background: var(--blue); }
  .sep { color: var(--border); }

  /* TABLE */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .tbl-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
  th {
    padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700;
    color: var(--text2); white-space: nowrap; letter-spacing: 0.3px;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 10px 14px; vertical-align: middle; }

  /* BADGES */
  .type-badge {
    font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 4px;
    font-family: 'DM Mono', monospace; letter-spacing: 0.5px;
  }
  .type-ebm { background: var(--blue-dim); color: var(--blue); border: 1px solid #2f81f733; }
  .type-isbm { background: var(--purple-dim); color: var(--purple); border: 1px solid #a371f733; }

  .status-badge {
    font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 20px;
    white-space: nowrap; display: inline-block;
  }

  /* PROCESS BAR */
  .process-bar { display: flex; align-items: center; gap: 3px; }
  .process-seg { width: 22px; height: 5px; border-radius: 3px; background: var(--border); }
  .process-label { font-size: 10px; margin-left: 5px; font-family: 'DM Mono', monospace; }

  /* PRODUCT CELL */
  .product-name { color: var(--text); max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .product-note { font-size: 11px; color: var(--text3); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 240px; }
  .date-cell { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); white-space: nowrap; }
  .brand-cell { font-weight: 700; color: var(--text); white-space: nowrap; }
  .mold-cell { color: var(--text2); white-space: nowrap; }
  .cavity-cell { font-family: 'DM Mono', monospace; color: var(--text2); text-align: center; }
  .postprocess-cell { color: var(--text2); white-space: nowrap; }

  /* ACTION BTNS */
  .action-btns { display: flex; gap: 5px; }
  .action-btn {
    padding: 3px 9px; border-radius: 5px; border: 1px solid var(--border);
    background: none; cursor: pointer; font-size: 11px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  }
  .action-btn.edit { color: var(--blue); }
  .action-btn.edit:hover { border-color: var(--blue); background: var(--blue-dim); }
  .action-btn.del { color: var(--red); }
  .action-btn.del:hover { border-color: var(--red); background: var(--red-dim); }

  /* KANBAN */
  .kanban-wrap { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 16px; }
  .kanban-col {
    flex: 0 0 250px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .kanban-header {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .kanban-title { font-size: 12px; font-weight: 800; }
  .kanban-count {
    font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 1px 8px; border-radius: 20px;
  }
  .kanban-body { padding: 10px; display: flex; flex-direction: column; gap: 7px; max-height: 580px; overflow-y: auto; }
  .kanban-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 11px 12px; cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .kanban-card:hover { border-color: var(--blue); transform: translateY(-1px); }
  .kanban-card-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .kanban-card-date { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .kanban-card-brand { font-weight: 700; font-size: 12px; margin-bottom: 3px; }
  .kanban-card-product { font-size: 11px; color: var(--text2); line-height: 1.4; }
  .kanban-card-mold { font-size: 10px; color: var(--text3); margin-top: 5px; }
  .kanban-empty { text-align: center; color: var(--text3); padding: 20px 0; font-size: 12px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: #00000055; z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; width: 580px; max-height: 90vh;
    overflow-y: auto; box-shadow: 0 24px 80px #0002;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: none; } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-title { font-size: 16px; font-weight: 900; }
  .modal-close { border: none; background: none; color: var(--text2); font-size: 22px; cursor: pointer; padding: 0 4px; }
  .modal-close:hover { color: var(--text); }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.3px; }
  .form-input, .form-select {
    width: 100%; padding: 8px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--blue); }
  .form-select option { background: var(--surface2); }
  .modal-footer { display: flex; gap: 8px; margin-top: 22px; }
  .modal-footer button { flex: 1; padding: 10px; border-radius: 7px; font-size: 13px; font-weight: 800; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }

  /* YEAR SECTION HEADER */
  .year-section {
    padding: 6px 14px; font-size: 11px; font-weight: 800; font-family: 'DM Mono', monospace;
    color: var(--text3); background: var(--bg); letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px; color: var(--text3); font-size: 13px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* DETAIL PANEL */
  .detail-overlay {
    display: none; position: fixed; inset: 0; background: #00000066; z-index: 900;
  }
  .detail-overlay.open { display: block; }
  .detail-panel {
    position: fixed; top: 0; right: -480px; width: 460px; height: 100vh;
    background: var(--surface); border-left: 1px solid var(--border);
    z-index: 901; overflow-y: auto; transition: right 0.28s cubic-bezier(0.16,1,0.3,1);
    box-shadow: -16px 0 48px #0002;
  }
  .detail-panel.open { right: 0; }
  .detail-panel-header {
    padding: 22px 24px 16px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--surface); z-index: 1;
  }
  .detail-panel-close {
    position: absolute; top: 18px; right: 20px;
    border: none; background: none; color: var(--text2); font-size: 20px;
    cursor: pointer; padding: 4px 6px; border-radius: 5px; line-height: 1;
    transition: color 0.1s;
  }
  .detail-panel-close:hover { color: var(--text); background: var(--surface2); }
  .detail-type-badge { margin-bottom: 8px; }
  .detail-title { font-size: 15px; font-weight: 900; line-height: 1.45; color: var(--text); padding-right: 28px; }
  .detail-brand { font-size: 13px; color: var(--text2); margin-top: 5px; }
  .detail-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }
  .detail-section { }
  .detail-section-title {
    font-size: 10px; font-weight: 800; color: var(--text3); letter-spacing: 1.2px;
    text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .detail-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 6px 0; border-bottom: 1px solid var(--border)11;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row-label { font-size: 11px; color: var(--text2); font-weight: 600; flex-shrink: 0; width: 80px; }
  .detail-row-value { font-size: 12px; color: var(--text); text-align: right; flex: 1; line-height: 1.5; }
  .detail-note-box {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; font-size: 12px; color: var(--text); line-height: 1.7;
    white-space: pre-wrap; word-break: break-all; min-height: 60px;
  }
  .detail-note-empty { color: var(--text3); font-style: italic; }
  .detail-process-full {
    display: flex; align-items: center; gap: 0;
  }
  .detail-process-step {
    flex: 1; text-align: center; padding: 8px 4px; font-size: 10px; font-weight: 700;
    border-radius: 0; position: relative;
  }
  .detail-process-step:first-child { border-radius: 6px 0 0 6px; }
  .detail-process-step:last-child { border-radius: 0 6px 6px 0; }
  .detail-actions {
    display: flex; gap: 8px; padding: 0 24px 24px;
  }
  .detail-actions button { flex: 1; }

  /* FORM NOTE TEXTAREA */
  .form-textarea {
    width: 100%; padding: 10px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; outline: none;
    transition: border-color 0.15s; resize: vertical; min-height: 120px;
    line-height: 1.65;
  }
  .form-textarea:focus { border-color: var(--blue); }

  /* PRODUCT LINK */
  .product-link {
    color: var(--text); cursor: pointer; text-decoration: none;
    border-bottom: 1px dashed var(--text3); transition: color 0.15s, border-color 0.15s;
    display: inline-block; max-width: 240px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom;
  }
  .product-link:hover { color: var(--blue); border-color: var(--blue); }

  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 16px; }
    .header { padding: 14px 16px 0; }
    .detail-panel { width: 100%; right: -100%; }
  }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loading-logo">SEOJIN PLATECH</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-msg" id="loadingMsg">Google Sheets 연동 중...</div>
</div>

<div class="header">
  <div class="header-top">
    <div class="logo-area">
      
      <div>
        <div style="font-size:22px; font-weight:900; letter-spacing:1.5px; color:#1a6fd4; line-height:1; font-family:'Noto Sans KR',sans-serif;">SEOJIN PLATECH</div>
        <div style="font-size:13px; font-weight:600; color:var(--text2); letter-spacing:0.3px; margin-top:4px;">신규 개발 일지</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="view-toggle">
        <button class="view-btn" id="viewTable" onclick="setView('table')">📋 테이블</button>
        <button class="view-btn active" id="viewKanban" onclick="setView('kanban')">🗂 칸반</button>
      </div>
      <button class="btn btn-primary" onclick="openModal(null, currentTab==='ISBM'?'ISBM':'EBM')">+ 신규 등록</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab전체" onclick="setTab('전체')">전체</button>
    <button class="tab" id="tabEBM" onclick="setTab('EBM')">EBM</button>
    <button class="tab" id="tabISBM" onclick="setTab('ISBM')">ISBM</button>
  </div>
</div>

<div class="main">
  <div class="stats-grid" id="statsGrid"></div>

  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="고객사, 제품명 검색..." oninput="render()">
    <select id="filterStatus" onchange="render()">
      <option value="">전체 상태</option>
      <option value="완료">완료</option>
      <option value="진행중">진행중</option>
      <option value="샘플">샘플진행중</option>
      <option value="대기">대기</option>
      <option value="취소">취소</option>
      <option value="종료">종료</option>
      <option value="반납">금형반납</option>
    </select>
    <select id="filterYear" onchange="render()">
      <option value="">전체 연도</option>
      <option value="2024">2024년</option>
      <option value="2025">2025년</option>
      <option value="2026">2026년</option>
    </select>
    <div class="filter-count" id="filterCount">0건</div>
  </div>

  <div class="legend">
    <span class="legend-title">프로세스 →</span>
    <span class="legend-item"><span class="legend-bar"></span> 접수/대기</span>
    <span class="legend-item"><span class="legend-bar" style="background:var(--purple)"></span> 샘플</span>
    <span class="legend-item"><span class="legend-bar" style="background:var(--blue)"></span> 진행중</span>
    <span class="legend-item"><span class="legend-bar" style="background:var(--yellow)"></span> 후가공</span>
    <span class="legend-item"><span class="legend-bar" style="background:var(--green)"></span> 완료</span>
    <span class="sep">|</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>완료</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>진행중</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--purple)"></span>샘플</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--yellow)"></span>대기</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>취소/반납</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--gray)"></span>종료</span>
  </div>

  <div id="contentArea"></div>
</div>


<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-panel-header">
    <button class="detail-panel-close" onclick="closeDetail()">×</button>
    <div class="detail-type-badge" id="dTypeBadge"></div>
    <div class="detail-title" id="dTitle"></div>
    <div class="detail-brand" id="dBrand"></div>
  </div>

// 파일의 DEFAULT_DATA_SAVED_AT(파일 저장 시각)과
// localStorage의 lastSaved(마지막 수정 시각)을 비교해 더 최신 데이터를 사용.
// 💾 파일저장 → 파일 열기: 파일 우선 / 브라우저에서 수정: localStorage 우선
const DEFAULT_DATA_SAVED_AT = 0; // 💾 파일저장 시 자동 갱신됨

function loadInitialData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.EBM && parsed.ISBM) {
        const localSaved = parsed.lastSaved || 0;
        // 파일이 더 최신이면 파일 우선 (다른 PC에서 열거나 새 파일로 저장한 경우)
        if (DEFAULT_DATA_SAVED_AT > localSaved) {
          return JSON.parse(JSON.stringify(DEFAULT_DATA));
        }
        // localStorage가 더 최신이거나 같으면 localStorage 우선 (수정 내용 보존)
        return parsed;
      }
    }
  } catch(e) { console.warn('localStorage 불러오기 실패', e); }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzQcGOQplCA0LdEbKpF8OdeKQFS-F71jvZg-02lpyr_uqjFqFybXkmW1gUrhz1J1HGV/exec';

async function syncToSheets(data) {
  try {
    // GET 방식으로 전송 (CORS 완전 우회)
    const encoded = encodeURIComponent(JSON.stringify(data));
    const url = GAS_URL + '?action=save&data=' + encoded;
    const res = await fetch(url);
    const text = await res.text();
    return text.includes('"ok":true') || text.includes('"ok": true');
  } catch(e) {
    console.warn('Sheets 동기화 실패:', e);
    return false;
  }
}

async function loadFromSheets() {
  try {
    const res = await fetch(GAS_URL + '?t=' + Date.now());
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.EBM && data.ISBM) return data;
    return null;
  } catch(e) {
    console.warn('Sheets 불러오기 실패:', e);
    return null;
  }
}

function saveToStorage() {
  try {
    DATA.lastSaved = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    showToast('저장됨');
    syncToSheets(DATA).then(ok => {
      if (ok) showToast('✅ Sheets 동기화 완료');
    }).catch(() => {});
  } catch(e) { console.warn('저장 실패', e); }
}

// HTML 파일로 저장 (백업용)
function saveAsFile() {
  const now = Date.now();
  DATA.lastSaved = now;
  const dataJson = JSON.stringify(DATA, null, 2);
  let updated = document.documentElement.outerHTML.replace(
    /const DEFAULT_DATA\s*=\s*\{[\s\S]*?\};\s*\/\/ <<<END_DEFAULT_DATA>>>/,
    'const DEFAULT_DATA = ' + dataJson + '; // <<<END_DEFAULT_DATA>>>'
  );
  // 파일 저장 시각도 함께 기록 (다음 번 열 때 localStorage와 비교용)
  updated = updated.replace(
    /const DEFAULT_DATA_SAVED_AT\s*=\s*\d+;/,
    'const DEFAULT_DATA_SAVED_AT = ' + now + ';'
  );
  const blob = new Blob([updated], {type: 'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '개발일지.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 파일 저장됐습니다');
}

// JSON 불러오기
function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.EBM || !parsed.ISBM) throw new Error('형식 오류');
        if (!confirm(`EBM ${parsed.EBM.length}건, ISBM ${parsed.ISBM.length}건을 불러옵니다.\n현재 데이터는 덮어쓰입니다. 계속할까요?`)) return;
        DATA = parsed;
        saveToStorage();
        render();
        showToast('불러오기 완료');
      } catch(err) {
        alert('올바른 개발일지 JSON 파일이 아닙니다.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetData() {
  if (!confirm('모든 데이터를 초기값으로 리셋하시겠습니까?\n(새로 추가하거나 수정한 내용이 모두 사라집니다)')) return;
  localStorage.removeItem(STORAGE_KEY);
  DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  render();
  showToast('초기화 완료');
}

// 토스트 알림
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
      background:#238636;color:#fff;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:700;
      z-index:9999;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;`;
    document.body.appendChild(t);
  }
  t.textContent = '✓ ' + msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(20px)';
  }, 2000);
}

function getFiltered() {

  const fYear = document.getElementById('filterYear').value;
  let items = [];

  if (currentTab !== 'EBM') items = items.concat(DATA.ISBM.map(d=>({...d,type:'ISBM'})));
  items.sort((a,b)=>b.date.localeCompare(a.date));
  if (fStatus) items = items.filter(d=>d.status.includes(fStatus));
  if (fYear) items = items.filter(d=>d.date.startsWith(fYear));
  if (search) items = items.filter(d=>
    (d.brand||'').toLowerCase().includes(search) ||
    (d.product||'').toLowerCase().includes(search) ||
    (d.mold||'').toLowerCase().includes(search)
  );
  return items;
}

function processBar(status) {
  const cfg = getStatus(status);
  const step = cfg.step;
  const colors = ['var(--yellow)','var(--purple)','var(--blue)','var(--blue)','var(--green)'];
  const labels = ['대기','샘플','진행중','후가공','완료'];
  if (step < 0) {
    return `<div class="process-bar">${[0,1,2,3,4].map(()=>`<div class="process-seg"></div>`).join('')}<span class="process-label" style="color:var(--gray)">종료</span></div>`;
  }
  return `<div class="process-bar">${[0,1,2,3,4].map(i=>
    `<div class="process-seg" title="${labels[i]}" style="background:${i<=step?colors[i]:'var(--border)'}"></div>`
  ).join('')}<span class="process-label" style="color:${colors[step]}">${labels[step]}</span></div>`;
}

function statusBadge(status) {
  const cfg = getStatus(status);
  const label = status.includes('반납')?'금형반납':status.includes('샘플')?'샘플':
    status.includes('진행중')?'진행중':status.includes('완료')?'완료':
    status.includes('대기')?'대기':status.includes('취소')?'취소':'종료';
  return `<span class="status-badge" style="background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.color}33">${label}</span>`;
}

function render() {
  const items = getFiltered();
  document.getElementById('filterCount').textContent = items.length + '건';

  // Stats
  const total = items.length;
  const done = items.filter(d=>d.status.includes('완료')).length;
  const ing = items.filter(d=>d.status.includes('진행중')||d.status.includes('샘플')).length;
  const wait = items.filter(d=>d.status.includes('대기')).length;
  const ended = items.filter(d=>d.status.includes('취소')||d.status.includes('종료')||d.status.includes('반납')).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">전체 항목</div><div class="stat-value" style="color:var(--text)">${total}</div></div>
    <div class="stat-card"><div class="stat-label">완료</div><div class="stat-value" style="color:var(--green)">${done}</div><div class="stat-sub">${pct}%</div></div>
    <div class="stat-card"><div class="stat-label">진행중</div><div class="stat-value" style="color:var(--blue)">${ing}</div></div>
    <div class="stat-card"><div class="stat-label">대기</div><div class="stat-value" style="color:var(--yellow)">${wait}</div></div>
    <div class="stat-card"><div class="stat-label">종료 / 취소</div><div class="stat-value" style="color:var(--gray)">${ended}</div></div>
  `;

  if (currentView === 'table') renderTable(items);
  else renderKanban(items);
}

function renderTable(items) {
  // Group by year
  const years = [...new Set(items.map(d=>d.date.slice(0,4)))].sort().reverse();
  let html = `<div class="table-wrap"><div class="tbl-scroll"><table>
    <thead><tr>
      <th>구분</th><th>작성일</th><th>상태</th><th>고객사</th>
      <th>제품명</th><th>캐비티</th><th>금형</th><th>후가공</th><th>프로세스</th><th></th>
    </tr></thead><tbody>`;
  if (items.length === 0) {
    html += `<tr><td colspan="11" class="empty">검색 결과가 없습니다.</td></tr>`;
  } else {
    let lastYear = '';
    for (const item of items) {
      const yr = item.date.slice(0,4);
      if (yr !== lastYear) {
        html += `<tr><td colspan="11" class="year-section">◆ ${yr}년</td></tr>`;
        lastYear = yr;
      }
      html += `<tr>
        <td><span class="type-badge type-${item.type.toLowerCase()}">${item.type}</span></td>
        <td class="date-cell">${item.date}</td>
        <td>${statusBadge(item.status)}</td>
        <td class="brand-cell">${item.brand}</td>
        <td>
          <span class="product-link" title="${item.product}" onclick="openDetail('${item.id}','${item.type}')">${item.product}</span>
          ${item.note?`<div class="product-note">${item.note.split('\n')[0]}</div>`:''}
        </td>
        <td class="cavity-cell">${item.cavity||'—'}</td>
        <td class="mold-cell">${item.mold||'—'}</td>
        <td class="postprocess-cell">${item.postProcess||'—'}</td>
        <td style="min-width:160px">${processBar(item.status)}</td>
        <td>
          <div class="action-btns">
            <button class="action-btn edit" onclick="openModal('${item.id}','${item.type}')">수정</button>
            <button class="action-btn del" onclick="deleteItem('${item.id}','${item.type}')">삭제</button>
          </div>
        </td>
      </tr>`;
    }
  }
  html += `</tbody></table></div></div>`;
  document.getElementById('contentArea').innerHTML = html;
}

function renderKanban(items) {
  const groups = [
    {key:'대기', label:'대기', color:'var(--yellow)', items: items.filter(d=>getStatus(d.status).step===0)},
    {key:'샘플', label:'샘플진행중', color:'var(--purple)', items: items.filter(d=>getStatus(d.status).step===1)},
    {key:'진행중', label:'진행중', color:'var(--blue)', items: items.filter(d=>getStatus(d.status).step===2)},
    {key:'완료', label:'완료', color:'var(--green)', items: items.filter(d=>getStatus(d.status).step===4)},
    {key:'종료', label:'종료 / 취소', color:'var(--gray)', items: items.filter(d=>getStatus(d.status).step===-1)},
  ];
  let html = `<div class="kanban-wrap">`;
  for (const g of groups) {
    html += `<div class="kanban-col">
      <div class="kanban-header">
        <span class="kanban-title" style="color:${g.color}">${g.label}</span>
        <span class="kanban-count" style="background:${g.color}22;color:${g.color}">${g.items.length}</span>
      </div>
      <div class="kanban-body">`;
    if (g.items.length === 0) {
      html += `<div class="kanban-empty">항목 없음</div>`;
    } else {
      for (const item of g.items) {
        html += `<div class="kanban-card" onclick="openDetail('${item.id}','${item.type}')">
          <div class="kanban-card-top">
            <span class="type-badge type-${item.type.toLowerCase()}">${item.type}</span>
            <span class="kanban-card-date">${item.date}</span>
          </div>
          <div class="kanban-card-brand">${item.brand}</div>
          <div class="kanban-card-product">${item.product.length>50?item.product.slice(0,50)+'…':item.product}</div>
          ${item.mold?`<div class="kanban-card-mold">금형: ${item.mold}</div>`:''}
        </div>`;
      }
    }
    html += `</div></div>`;
  }
  html += `</div>`;
  document.getElementById('contentArea').innerHTML = html;
}

function openModal(id, type) {
  editingId = id;
  editingType = type;
  const overlay = document.getElementById('modalOverlay');
  if (id) {
    const item = DATA[type].find(d=>d.id===id);
    document.getElementById('modalTitle').textContent = '개발 항목 수정';
    document.getElementById('fId').value = item.id;
    document.getElementById('fTypeSelect').value = type;
    document.getElementById('fDate').value = item.date;
    document.getElementById('fStatus').value = item.status;
    document.getElementById('fBrand').value = item.brand;
    document.getElementById('fProduct').value = item.product;
    document.getElementById('fCavity').value = item.cavity||'';
    document.getElementById('fMold').value = item.mold||'';
    document.getElementById('fPostProcess').value = item.postProcess||'';
    document.getElementById('fNote').value = item.note||'';
    document.getElementById('fProductCode').value = item.productCode||'';
  } else {
    document.getElementById('modalTitle').textContent = '신규 개발 등록';
    document.getElementById('fId').value = '';
    document.getElementById('fTypeSelect').value = type||'EBM';
    document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('fStatus').value = '대기';
    document.getElementById('fBrand').value = '';
    document.getElementById('fProduct').value = '';
    document.getElementById('fCavity').value = '2';
    document.getElementById('fMold').value = '';
    document.getElementById('fPostProcess').value = '';
    document.getElementById('fNote').value = '';
    document.getElementById('fProductCode').value = '';
    setTimeout(() => autoStampIfEmpty(false), 50);
  }
  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null; editingType = null;
}

// ESC 키로 모달/상세 패널 닫기
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Escape') return;
  const modal = document.getElementById('modalOverlay');
  const detail = document.getElementById('detailOverlay');
  if (modal && modal.classList.contains('open')) { closeModal(); return; }
  if (detail && detail.classList.contains('open')) { closeDetail(); }
});

// 오버레이 클릭으로 모달 닫기 - 드래그 시 오작동 방지
(function() {
  let mousedownTarget = null;
  document.addEventListener('mousedown', function(e) {
    mousedownTarget = e.target;
  });
  document.addEventListener('click', function(e) {
    const overlay = document.getElementById('modalOverlay');
    if (e.target === overlay && mousedownTarget === overlay) {
      closeModal();
    }
    mousedownTarget = null;
  });
})();

// 날짜 스탬프 삽입 (커서 위치에)
function insertDateStamp() {
  const ta = document.getElementById('fNote');
  const today = new Date();
  const yy = String(today.getFullYear()).slice(2);
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  const stamp = yy + '.' + mm + '.' + dd + ' ';

  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const val = ta.value;

  // 커서가 줄 맨 앞이 아니면 앞에 줄바꿈 추가
  const beforeCursor = val.slice(0, start);
  const needNewline = beforeCursor.length > 0 && !beforeCursor.endsWith('\n');
  const insert = (needNewline ? '\n' : '') + stamp;

  ta.value = val.slice(0, start) + insert + val.slice(end);
  const newPos = start + insert.length;
  ta.selectionStart = ta.selectionEnd = newPos;
  ta.focus();
}

// 모달 열릴 때 수정 모드면 날짜 스탬프 자동 추가 여부 확인용 플래그
function autoStampIfEmpty(isEdit) {
  // 신규 등록 시에만 자동으로 날짜 스탬프 삽입
  if (!isEdit) {
    const ta = document.getElementById('fNote');
    if (!ta.value.trim()) {
      const today = new Date();
      const yy = String(today.getFullYear()).slice(2);
      const mm = String(today.getMonth()+1).padStart(2,'0');
      const dd = String(today.getDate()).padStart(2,'0');
      ta.value = yy + '.' + mm + '.' + dd + ' ';
      ta.selectionStart = ta.selectionEnd = ta.value.length;
    }
  }
}

function saveItem() {
  const id = document.getElementById('fId').value;
  const type = document.getElementById('fTypeSelect').value;
  const item = {
    id: id || type[0].toLowerCase() + Date.now(),
    date: document.getElementById('fDate').value,
    status: document.getElementById('fStatus').value,
    brand: document.getElementById('fBrand').value,
    product: document.getElementById('fProduct').value,
    cavity: parseInt(document.getElementById('fCavity').value)||0,
    mold: document.getElementById('fMold').value,
    postProcess: document.getElementById('fPostProcess').value,
    note: document.getElementById('fNote').value,
    productCode: document.getElementById('fProductCode').value,
  };
  const oldType = editingType;
  // If type changed, remove from old
  if (id && oldType && oldType !== type) {
    DATA[oldType] = DATA[oldType].filter(d=>d.id!==id);
  }
  const list = DATA[type];
  const idx = list.findIndex(d=>d.id===item.id);
  if (idx >= 0) list[idx] = item;
  else list.push(item);
  saveToStorage();
  closeModal();
  render();
}

function deleteItem(id, type) {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  DATA[type] = DATA[type].filter(d=>d.id!==id);
  saveToStorage();
  render();
}

function openDetail(id, type) {
  const item = DATA[type].find(d=>d.id===id);
  if (!item) return;
  const cfg = getStatus(item.status);
  const steps = ['접수/대기','샘플제작','진행중','후가공','완료'];
  const stepColors = ['var(--yellow)','var(--purple)','var(--blue)','var(--blue)','var(--green)'];
  const activeStep = cfg.step;

  document.getElementById('dTypeBadge').innerHTML = `<span class="type-badge type-${type.toLowerCase()}">${type}</span>`;
  document.getElementById('dTitle').textContent = item.product;
  document.getElementById('dBrand').textContent = item.brand;
  document.getElementById('dDate').textContent = item.date;
  document.getElementById('dStatus').innerHTML = statusBadge(item.status);
  document.getElementById('dBrand2').textContent = item.brand || '—';
  document.getElementById('dProductCode').textContent = item.productCode || '—';
  document.getElementById('dCavity').textContent = item.cavity ? item.cavity + ' 캐비티' : '—';
  document.getElementById('dMold').textContent = item.mold || '—';
  document.getElementById('dPostProcess').textContent = item.postProcess || '—';

  const noteEl = document.getElementById('dNote');
  if (item.note && item.note.trim()) {
    noteEl.textContent = item.note;
    noteEl.classList.remove('detail-note-empty');
  } else {
    noteEl.textContent = '참조 내용 없음';
    noteEl.classList.add('detail-note-empty');
  }

  let procHtml = '<div class="detail-process-full">';
  if (activeStep < 0) {
    steps.forEach(s => {
      procHtml += `<div class="detail-process-step" style="background:var(--surface2);color:var(--text3)">${s}</div>`;
    });
  } else {
    steps.forEach((s,i) => {
      const active = i <= activeStep;
      procHtml += `<div class="detail-process-step" style="background:${active?stepColors[i]+'33':'var(--surface2)'};color:${active?stepColors[i]:'var(--text3)'}">${s}</div>`;
    });
  }
  procHtml += '</div>';
  document.getElementById('dProcessFull').innerHTML = procHtml;

  document.getElementById('dEditBtn').onclick = () => { closeDetail(); openModal(id, type); };

  document.getElementById('detailOverlay').classList.add('open');
  requestAnimationFrame(() => document.getElementById('detailPanel').classList.add('open'));
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('detailOverlay').classList.remove('open');
}

// 페이지 로드 시 Sheets에서 최신 데이터 자동 로드 (선택적)
(async () => {
  const overlay = document.getElementById('loadingOverlay');
  const msg = document.getElementById('loadingMsg');

  function hideOverlay() {
    overlay.classList.add('hidden');
    setTimeout(() => overlay.style.display = 'none', 400);
  }

  try {
    const sheetsData = await loadFromSheets();
    const sheetsTotal = sheetsData ? (sheetsData.EBM||[]).length + (sheetsData.ISBM||[]).length : 0;
    const currentTotal = DATA.EBM.length + DATA.ISBM.length;

    if (sheetsTotal > currentTotal) {
      // Sheets에 더 많은 데이터 → Sheets 우선
      DATA = sheetsData;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
      msg.textContent = '✅ 완료';
    } else if (currentTotal > sheetsTotal) {
      // 파일 데이터가 더 많음 → Sheets에 업로드
      msg.textContent = 'Sheets에 데이터 동기화 중...';
      await syncToSheets(DATA);
      msg.textContent = '✅ 완료';
    } else {
      msg.textContent = '✅ 완료';
    }
  } catch(e) {
    msg.textContent = '⚠️ Sheets 연결 실패 — 로컬 데이터로 시작합니다';
  }
  render();
  setTimeout(hideOverlay, 500);
})();
</script>
